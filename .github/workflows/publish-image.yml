name: Publish Gmail Monitor image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish. Defaults to short commit SHA."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          image_name="ghcr.io/${repo}/gmail-monitor"
          tag="${{ inputs.tag }}"
          if [[ -z "$tag" ]]; then
            tag="${GITHUB_SHA::12}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=${image_name}:$tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          build-args: |
            OCI_IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Summarize published image
        shell: bash
        run: |
          {
            echo "## Published image"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Source revision: \`${{ github.sha }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
